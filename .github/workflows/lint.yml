name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@825de87bb7a41da3f54e6863939129d6dfc82da8 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@825de87bb7a41da3f54e6863939129d6dfc82da8 # main
    with:
      working-directory: bff

  prettier:
    name: Prettier
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@825de87bb7a41da3f54e6863939129d6dfc82da8 # main
    with:
      working-directory: web

  eslint:
    name: ESLint
    uses: harryzcy/github-actions/.github/workflows/npm-lint.yml@825de87bb7a41da3f54e6863939129d6dfc82da8 # main
    with:
      working-directory: web

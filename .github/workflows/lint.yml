name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main
    with:
      working-directory: bff

  prettier:
    name: Prettier
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main
    with:
      working-directory: web

  eslint:
    name: ESLint
    uses: harryzcy/github-actions/.github/workflows/npm-lint.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main
    with:
      working-directory: web

name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@25d834bc6f100ee46b88756cb6ec46204f04705a # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@25d834bc6f100ee46b88756cb6ec46204f04705a # main
    with:
      working-directory: bff

  prettier:
    name: Prettier
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@25d834bc6f100ee46b88756cb6ec46204f04705a # main
    with:
      working-directory: web

  eslint:
    name: ESLint
    uses: harryzcy/github-actions/.github/workflows/npm-lint.yml@25d834bc6f100ee46b88756cb6ec46204f04705a # main
    with:
      working-directory: web
